# ============================================================
# Urban-GenX | Docker Compose
# ============================================================
# Usage:
#   docker-compose up --build        → Build + start dashboard
#   docker-compose run app python src/training/train_vision.py  → Train
#   docker-compose run app python src/federated/server.py       → FL sim
# ============================================================

version: "3.8"

services:
  app:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./checkpoints:/app/checkpoints
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_HEADLESS=true
    deploy:
      resources:
        limits:
          memory: 12G
          cpus: "4"
    restart: unless-stopped
