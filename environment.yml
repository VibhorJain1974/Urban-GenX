# ============================================================
# Urban-GenX | environment.yml  (FINAL CORRECTED VERSION)
# Conda environment for Python 3.10 CPU-only setup
# Create: conda env create -f environment.yml
# Activate: conda activate urban-genx
# ============================================================
name: urban-genx
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
      # Core ML
      - torch==2.1.0
      - torchvision==0.16.0
      # Federated Learning
      - flwr==1.5.0
      - ray==2.6.3
      # Differential Privacy
      - opacus==1.4.0
      # Audio
      - librosa==0.10.1
      - soundfile==0.12.1
      # Dashboard
      - streamlit==1.28.0
      - altair==4.2.2
      # Monitoring
      - tqdm==4.66.1
      - requests==2.31.0
      # Data
      - numpy==1.24.4
      - pandas==2.1.1
      - scipy==1.11.4
      - h5py==3.10.0
      - pillow==10.1.0
      # ML utilities
      - scikit-learn==1.3.2
      - matplotlib==3.8.0
      # NLP semantic interface
      - sentence-transformers==2.7.0
      - transformers==4.35.2
      - huggingface-hub==0.36.2
      - tokenizers==0.15.2
      - sentencepiece==0.2.0
      # Data downloads
      - dataretrieval==1.0.11
      # Build tools
      - setuptools==80.9.0
      - pyyaml==6.0.1
